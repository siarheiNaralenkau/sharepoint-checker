tenant_id: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
client_id: "yyyyyyyy-yyyy-yyyy-yyyy-yyyyyyyyyyyy"
#client_secret_env: "SP_CHECKER_CLIENT_SECRET"

delegated_auth:
  token_cache_path: "~/.sp-checker-token-cache.json"   # where MSAL stores the refresh token

discovery:
  mode: "prefix"            # prefix | all-visible
  site_prefixes:
    - "EPAM SAP SE"         # Graph API search keyword — returns all sites whose name contains this

rules:
  # Regex matched against root-level folder names. First match is used.
  leadership_folder_regex: "^Project SAP-[A-Za-z]+ leadership$"
  # Name(s) of the subfolder inside the leadership folder that must exist and contain files.
  # Multiple names can be separated by "|" (e.g. "Roaster|Roster").
  roaster_folder_name: "Roaster"

execution:
  max_parallel_sites: 4
  page_size: 200
  retry_attempts: 5
  retry_backoff_seconds: 2

reporting:
  output_dir: "./out"
  formats:
    - "json"
    - "csv"
    - "xlsx"
    - "html"
  only_failures_in_notification: false
  email:
    enabled: false
    recipients:
      - "pm@example.com"
    smtp_host: "smtp.office365.com"
    smtp_port: 587
    smtp_user_env: "SP_CHECKER_SMTP_USER"
    smtp_password_env: "SP_CHECKER_SMTP_PASSWORD"
    from_address: "noreply@example.com"
  teams:
    enabled: false
    webhook_env: "SP_CHECKER_TEAMS_WEBHOOK"
