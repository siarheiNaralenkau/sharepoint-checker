tenant_id: "b41b72d0-4e9f-4c26-8a69-f949f367c91d"
client_id: "ca3b0207-fd51-4836-a3bc-fb4dba28afcf"
#client_secret_env: "SP_CHECKER_CLIENT_SECRET"

delegated_auth:
  token_cache_path: "~/.sp-checker-token-cache.json"   # where MSAL stores the refresh token

discovery:
  mode: "all-visible"       # all-visible | prefix
  site_prefixes: []         # used as Graph search terms in prefix mode only
  display_name_patterns:    # keep only sites whose displayName matches any pattern (case-insensitive regex)
    - "EPAM SAP"

sharepoint:
  library_name: "Shared Documents"
  root_folder: "/"
  project_folder_regex: "^Project-[A-Za-z0-9]+-.+$"

rules:
  required_folders:
    - "Planning"
    - "Risks"
    - "Reports"
    - "Architecture"
  required_files:
    Planning:
      - "project-charter.docx"
      - "roadmap.xlsx"
    Reports:
      - "weekly-status.xlsx"
      - "status-summary.pptx"

execution:
  max_parallel_sites: 4
  page_size: 200
  retry_attempts: 5
  retry_backoff_seconds: 2

reporting:
  output_dir: "./out"
  formats:
    - "json"
    - "csv"
    - "html"
  only_failures_in_notification: false
  email:
    enabled: false
    recipients:
      - "pm@example.com"
    smtp_host: "smtp.office365.com"
    smtp_port: 587
    smtp_user_env: "SP_CHECKER_SMTP_USER"
    smtp_password_env: "SP_CHECKER_SMTP_PASSWORD"
    from_address: "noreply@example.com"
  teams:
    enabled: false
    webhook_env: "SP_CHECKER_TEAMS_WEBHOOK"
